name: zlibrary-to-notebooklm
version: 1.1.0
description: Automatically download books from Z-Library and upload them to Google NotebookLM with one command.
author: zstmfhy
contributors:
  - elhoim

commands:
  - name: login
    description: Log in to Z-Library (only required once)
    usage: python3 scripts/login.py

  - name: upload
    description: Download and upload a book to NotebookLM
    usage: python3 scripts/upload.py <Z-Library URL>
    arguments:
      - name: url
        description: Z-Library book link
        required: true

features:
  - Log in once, use forever
  - Prioritize PDF download (preserves formatting)
  - Automatic fallback EPUB -> Markdown
  - Smart file splitting (auto-chunk when >350k words)
  - Fully automated workflow
  - Real-time progress display

dependencies:
  - python>=3.8
  - playwright
  - ebooklib
  - notebooklm-cli
